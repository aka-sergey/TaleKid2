name: talekid
description: "TaleKID - Personalized fairy tales for children"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0
  http: ^1.2.2

  # Auth & Security
  flutter_secure_storage: ^9.2.4

  # Data Models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Local Storage
  hive_flutter: ^1.1.0

  # Image handling
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Push Notifications
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.4
  flutter_local_notifications: ^18.0.1

  # PDF & Sharing
  pdf: ^3.11.2
  printing: ^5.13.5
  share_plus: ^10.1.4

  # Utilities
  url_launcher: ^6.3.1
  intl: ^0.19.0
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.2
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  build_runner: ^2.4.14
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.2

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
